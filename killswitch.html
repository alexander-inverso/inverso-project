<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KILLSWITCH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fff;
            color: #111;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ─── AUTH GATE ─────────────────────────────── */
        #auth-gate {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            z-index: 100;
        }

        .auth-box {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 85vw;
            max-width: 320px;
        }

        .auth-label {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: #aaa;
            text-transform: uppercase;
        }

        #auth-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #ccc;
            color: #111;
            font-family: inherit;
            font-size: 1.2rem;
            padding: 0.5rem 0;
            letter-spacing: 0.3em;
            outline: none;
            width: 100%;
        }

        #auth-input:focus { border-bottom-color: #111; }
        #auth-input::placeholder { color: #ddd; }

        .auth-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-family: inherit;
            font-size: 0.7rem;
            padding: 0.5rem 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-align: left;
        }

        .auth-btn:hover { color: #111; }

        #auth-error {
            font-size: 0.65rem;
            color: #bbb;
            min-height: 1rem;
            letter-spacing: 0.1em;
        }

        /* ─── MAIN ──────────────────────────────────── */
        #main-content {
            display: none;
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .page-wrapper {
            min-height: 100vh;
            padding: 3.5rem 3rem 5rem;
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* ─── "LOCK IN." ────────────────────────────── */
        .lock-in-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: clamp(5rem, 18vw, 9.5rem);
            line-height: 0.9;
            letter-spacing: -0.03em;
            color: #111;
            user-select: none;
        }

        /* ─── NOTAS / TO-DO ─────────────────────────── */
        .notes-section {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .notes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e8e8e8;
            padding-bottom: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .notes-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: #bbb;
            text-transform: uppercase;
        }

        .save-indicator {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: #bbb;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .save-indicator.visible { opacity: 1; }

        /* Todo list */
        #todo-list {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
        }

        .todo-check {
            appearance: none;
            width: 14px;
            height: 14px;
            min-width: 14px;
            border: 1px solid #ccc;
            background: transparent;
            cursor: pointer;
            margin-top: 3px;
            position: relative;
            flex-shrink: 0;
            border-radius: 0;
        }

        .todo-check:checked { border-color: #bbb; }

        .todo-check:checked::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 8px; height: 8px;
            background: #bbb;
        }

        .todo-text {
            background: transparent;
            border: none;
            color: #111;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.5;
            outline: none;
            flex: 1;
            padding: 0;
            resize: none;
            overflow: hidden;
            min-height: 1.4rem;
        }

        .todo-text.done {
            color: #ccc;
            text-decoration: line-through;
            text-decoration-color: #ccc;
        }

        .todo-text::placeholder { color: #ddd; }

        .todo-delete {
            background: transparent;
            border: none;
            color: #ddd;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0 2px;
            font-family: inherit;
            flex-shrink: 0;
            margin-top: 2px;
            display: none;
        }

        .todo-item:hover .todo-delete { display: block; }
        .todo-delete:hover { color: #999; }

        .add-todo-btn {
            background: transparent;
            border: none;
            color: #ccc;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            text-align: left;
            padding: 0.5rem 0;
            letter-spacing: 0.05em;
            margin-top: 0.2rem;
        }

        .add-todo-btn:hover { color: #111; }

        /* Área libre */
        .divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin: 1rem 0 0.5rem;
        }

        #free-notes {
            background: transparent;
            border: none;
            color: #999;
            font-family: inherit;
            font-size: 0.875rem;
            line-height: 1.9;
            outline: none;
            width: 100%;
            min-height: 100px;
            resize: none;
            padding: 0;
        }

        #free-notes::placeholder { color: #e0e0e0; }

        /* ─── LOGOUT ────────────────────────────────── */
        .logout-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.75rem;
            background: transparent;
            border: none;
            color: #ddd;
            font-family: inherit;
            font-size: 0.6rem;
            cursor: pointer;
            letter-spacing: 0.15em;
            z-index: 20;
            text-transform: uppercase;
        }

        .logout-btn:hover { color: #999; }
    </style>
</head>
<body>

<!-- ─── AUTH GATE ─────────────────────────────────── -->
<div id="auth-gate">
    <div class="auth-box">
        <div class="auth-label">Acceso restringido</div>
        <input
            type="password"
            id="auth-input"
            placeholder="••••••••"
            autocomplete="off"
            onkeydown="if(event.key==='Enter') authenticate()"
            autofocus
        >
        <button class="auth-btn" onclick="authenticate()">Entrar →</button>
        <div id="auth-error"></div>
    </div>
</div>

<!-- ─── MAIN CONTENT ──────────────────────────────── -->
<div id="main-content">
    <div class="page-wrapper">

        <h1 class="lock-in-title">Lock in.</h1>

        <div class="notes-section">
            <div class="notes-header">
                <div class="notes-label">To-do</div>
                <div class="save-indicator" id="save-indicator">guardado</div>
            </div>

            <div id="todo-list"></div>
            <button class="add-todo-btn" onclick="addTodo()">+ añadir</button>

            <hr class="divider">
            <textarea
                id="free-notes"
                placeholder="notas..."
                spellcheck="false"
            ></textarea>
        </div>

    </div>

    <button class="logout-btn" onclick="logout()">salir</button>
</div>

<script>
    // CAMBIA ESTA CONTRASEÑA antes de publicar.
    const SECRET_PASS = 'PON_AQUI_TU_CLAVE';

    const TOKEN_KEY = 'ks_v1_token';
    const TODOS_KEY = 'ks_v1_todos';
    const NOTES_KEY = 'ks_v1_notes';

    const validToken = 'ks:' + btoa(unescape(encodeURIComponent(SECRET_PASS)));

    // ─── AUTH ─────────────────────────────────────────
    function checkAuth() {
        if (localStorage.getItem(TOKEN_KEY) === validToken) showMain();
    }

    function authenticate() {
        const input = document.getElementById('auth-input').value;
        const inputToken = 'ks:' + btoa(unescape(encodeURIComponent(input)));
        if (inputToken === validToken) {
            localStorage.setItem(TOKEN_KEY, validToken);
            showMain();
        } else {
            const err = document.getElementById('auth-error');
            err.textContent = 'incorrecto';
            document.getElementById('auth-input').value = '';
            setTimeout(() => err.textContent = '', 1500);
        }
    }

    function showMain() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initMain();
    }

    function logout() {
        localStorage.removeItem(TOKEN_KEY);
        location.reload();
    }

    // ─── TODO LIST ────────────────────────────────────
    let todos = [];
    let saveTimer = null;

    function loadTodos() {
        try { todos = JSON.parse(localStorage.getItem(TODOS_KEY)) || []; }
        catch { todos = []; }
    }

    function saveTodos() {
        localStorage.setItem(TODOS_KEY, JSON.stringify(todos));
        flashSaved();
    }

    function renderTodos() {
        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach((item, i) => {
            const row = document.createElement('div');
            row.className = 'todo-item';
            row.innerHTML = `
                <input type="checkbox" class="todo-check" ${item.done ? 'checked' : ''}
                    onchange="toggleTodo(${i})">
                <textarea class="todo-text ${item.done ? 'done' : ''}"
                    rows="1"
                    spellcheck="false"
                    placeholder="..."
                    onInput="updateTodoText(${i}, this)"
                    onKeydown="todoKeydown(event, ${i})"
                >${item.text}</textarea>
                <button class="todo-delete" onclick="deleteTodo(${i})">✕</button>
            `;
            list.appendChild(row);
            autoResize(row.querySelector('textarea'));
        });
    }

    function autoResize(ta) {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
    }

    function addTodo() {
        todos.push({ text: '', done: false });
        saveTodos();
        renderTodos();
        const items = document.querySelectorAll('.todo-text');
        if (items.length) items[items.length - 1].focus();
    }

    function toggleTodo(i) {
        todos[i].done = !todos[i].done;
        saveTodos();
        renderTodos();
    }

    function deleteTodo(i) {
        todos.splice(i, 1);
        saveTodos();
        renderTodos();
    }

    function updateTodoText(i, ta) {
        todos[i].text = ta.value;
        autoResize(ta);
        debounceSave();
    }

    function todoKeydown(event, i) {
        if (event.key === 'Enter') {
            event.preventDefault();
            todos.splice(i + 1, 0, { text: '', done: false });
            saveTodos();
            renderTodos();
            const items = document.querySelectorAll('.todo-text');
            if (items[i + 1]) items[i + 1].focus();
        } else if (event.key === 'Backspace') {
            const ta = event.target;
            if (ta.value === '' && todos.length > 1) {
                event.preventDefault();
                deleteTodo(i);
                const items = document.querySelectorAll('.todo-text');
                const prev = items[Math.max(0, i - 1)];
                if (prev) { prev.focus(); const l = prev.value.length; prev.setSelectionRange(l, l); }
            }
        }
    }

    // ─── FREE NOTES ───────────────────────────────────
    function initFreeNotes() {
        const ta = document.getElementById('free-notes');
        ta.value = localStorage.getItem(NOTES_KEY) || '';
        ta.addEventListener('input', () => {
            localStorage.setItem(NOTES_KEY, ta.value);
            debounceSave();
        });
    }

    function debounceSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveTodos(); }, 600);
    }

    function flashSaved() {
        const el = document.getElementById('save-indicator');
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 1500);
    }

    // ─── INIT ─────────────────────────────────────────
    function initMain() {
        loadTodos();
        if (todos.length === 0) todos.push({ text: '', done: false });
        renderTodos();
        initFreeNotes();
    }

    checkAuth();
</script>
</body>
</html>
