<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Proyecto Inverso</title>
  <meta name="description" content="Proyecto Inverso — Alexander DTT. Un proyecto sobre cómo entender el mundo. Escríbeme: alexander@inverso.bio" />
  <meta name="theme-color" content="#15110F" />
  <link rel="canonical" href="https://inverso.bio/" />
  <meta property="og:title" content="Proyecto Inverso" />
  <meta property="og:description" content="Alexander DTT — alexander@inverso.bio" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://inverso.bio/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body class="landing-body">
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div id="bg-veil" aria-hidden="true"></div>

  <div class="lang-switch" role="group" aria-label="Idioma / Language / Idioma">
    <button type="button" class="lang-btn" data-lang="es">ESP</button>
    <button type="button" class="lang-btn" data-lang="en">ENG</button>
    <button type="button" class="lang-btn" data-lang="ca">CAT</button>
  </div>

  <main class="landing">
    <p class="landing-kicker rise" style="--i:0" data-i18n="kicker">Proyecto Inverso</p>
    <h1 class="landing-name rise" style="--i:1">Alexander DTT</h1>
    <p class="landing-line rise" style="--i:2" data-i18n="lede">
      Un proyecto sobre cómo entender el mundo: biología, computación,
      epistemología y preguntas grandes. Todavía tomando forma.
    </p>
    <nav class="landing-contacts rise" style="--i:3" aria-label="Contacto">
      <a href="mailto:alexander@inverso.bio" class="contact-link">
        <span class="contact-label" data-i18n="emailLabel">correo</span>
        <span class="contact-value">alexander@inverso.bio</span>
      </a>
      <a href="https://instagram.com/alexander.inverso" target="_blank" rel="noopener" class="contact-link">
        <span class="contact-label" data-i18n="instaLabel">insta</span>
        <span class="contact-value">alexander.inverso</span>
      </a>
    </nav>
  </main>

  <script type="module" src="/assets/js/landing.js"></script>
</body>
</html>
