<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KILLSWITCH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --term-green: #00ff41;
            --err-red: #ff003c;
            --cyber-yel: #fcee0a;
            --white: #f0f0f0;
            --dim: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ─── AUTH GATE ─────────────────────────────── */
        #auth-gate {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
        }

        .auth-box {
            width: 85vw;
            max-width: 360px;
            border: 2px solid var(--white);
            padding: 2rem;
            box-shadow: 8px 8px 0 var(--white);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .auth-label {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
        }

        #auth-input {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--white);
            font-family: inherit;
            font-size: 1.4rem;
            padding: 0.6rem 0.8rem;
            letter-spacing: 0.3em;
            outline: none;
            width: 100%;
        }

        #auth-input:focus { border-color: var(--white); }

        #auth-input::placeholder { color: #333; letter-spacing: 0.2em; }

        .auth-btn {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: none;
        }

        .auth-btn:active {
            background: var(--white);
            color: var(--bg);
            transform: translate(2px, 2px);
        }

        #auth-error {
            font-size: 0.8rem;
            color: var(--err-red);
            min-height: 1.2rem;
            letter-spacing: 0.1em;
        }

        /* ─── MAIN ──────────────────────────────────── */
        #main-content {
            display: none;
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* Fondo animado */
        #canvas-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .floating-word {
            position: absolute;
            font-weight: 900;
            text-transform: uppercase;
            user-select: none;
            line-height: 0.8;
            transition: none;
        }

        .glitch-color-1 { color: var(--term-green); opacity: 0.25; }
        .glitch-color-2 { color: var(--err-red);    opacity: 0.25; }
        .glitch-color-3 { color: var(--cyber-yel);  opacity: 0.2; }
        .glitch-color-4 { color: #1a1a1a;           opacity: 1; font-size: 4rem; }

        /* Contenido principal */
        .page-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 3rem 2rem 4rem;
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* ─── "LOCK IN." ────────────────────────────── */
        .lock-in-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: clamp(5rem, 18vw, 10rem);
            line-height: 0.9;
            letter-spacing: -0.02em;
            color: var(--white);
            /* Sombra dura brutalista */
            text-shadow: 6px 6px 0 rgba(0, 255, 65, 0.15);
            user-select: none;
        }

        .lock-in-dot { color: var(--term-green); }

        /* ─── NOTAS / TO-DO ─────────────────────────── */
        .notes-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 1;
        }

        .notes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }

        .notes-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
        }

        .save-indicator {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--dim);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-indicator.visible { opacity: 1; color: var(--term-green); }

        /* Todo list */
        #todo-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            group: true;
        }

        .todo-check {
            appearance: none;
            width: 16px;
            height: 16px;
            min-width: 16px;
            border: 1px solid var(--dim);
            background: transparent;
            cursor: pointer;
            margin-top: 2px;
            position: relative;
            flex-shrink: 0;
        }

        .todo-check:checked {
            border-color: var(--term-green);
            background: transparent;
        }

        .todo-check:checked::after {
            content: '✕';
            position: absolute;
            top: -3px;
            left: 1px;
            font-size: 12px;
            color: var(--term-green);
            font-weight: bold;
        }

        .todo-text {
            background: transparent;
            border: none;
            color: var(--white);
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.4;
            outline: none;
            flex: 1;
            padding: 0;
            resize: none;
            overflow: hidden;
            min-height: 1.4rem;
        }

        .todo-text.done {
            color: var(--dim);
            text-decoration: line-through;
            text-decoration-color: #444;
        }

        .todo-text::placeholder { color: #333; }

        .todo-delete {
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0 4px;
            font-family: inherit;
            flex-shrink: 0;
            margin-top: 1px;
            transition: color 0.15s;
            display: none;
        }

        .todo-item:hover .todo-delete { display: block; color: var(--err-red); }

        .add-todo-btn {
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            padding: 0.4rem 0;
            letter-spacing: 0.05em;
            margin-top: 0.4rem;
        }

        .add-todo-btn:hover { color: var(--white); }

        /* Área libre (textarea) debajo de los todos */
        .notes-area-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #333;
            text-transform: uppercase;
            margin-top: 1.5rem;
            border-top: 1px solid #111;
            padding-top: 0.75rem;
        }

        #free-notes {
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.8;
            outline: none;
            width: 100%;
            min-height: 120px;
            resize: none;
            padding: 0;
        }

        #free-notes::placeholder { color: #222; }

        /* ─── LOGOUT ────────────────────────────────── */
        .logout-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: #222;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            letter-spacing: 0.1em;
            z-index: 20;
            text-transform: uppercase;
        }

        .logout-btn:hover { color: var(--err-red); }
    </style>
</head>
<body>

<!-- ─── AUTH GATE ─────────────────────────────────── -->
<div id="auth-gate">
    <div class="auth-box">
        <div class="auth-label">Acceso restringido</div>
        <input
            type="password"
            id="auth-input"
            placeholder="••••••••"
            autocomplete="off"
            onkeydown="if(event.key==='Enter') authenticate()"
            autofocus
        >
        <button class="auth-btn" onclick="authenticate()">Entrar</button>
        <div id="auth-error"></div>
    </div>
</div>

<!-- ─── MAIN CONTENT ──────────────────────────────── -->
<div id="main-content">
    <div id="canvas-layer"></div>

    <div class="page-wrapper">

        <h1 class="lock-in-title">Lock in<span class="lock-in-dot">.</span></h1>

        <div class="notes-section">
            <div class="notes-header">
                <div class="notes-label">// to-do</div>
                <div class="save-indicator" id="save-indicator">guardado</div>
            </div>

            <div id="todo-list"></div>
            <button class="add-todo-btn" onclick="addTodo()">+ añadir</button>

            <div class="notes-area-label">// notas libres</div>
            <textarea
                id="free-notes"
                placeholder="escribe aquí..."
                spellcheck="false"
            ></textarea>
        </div>

    </div>

    <button class="logout-btn" onclick="logout()">salir</button>
</div>

<script>
    // ─── CONFIGURACIÓN ────────────────────────────────
    // CAMBIA ESTA CONTRASEÑA. Es visible en el source, pero
    // protege de accesos casuales sin necesitar servidor ni IP fija.
    const SECRET_PASS = 'PON_AQUI_TU_CLAVE';

    const TOKEN_KEY = 'ks_v1_token';
    const TODOS_KEY = 'ks_v1_todos';
    const NOTES_KEY = 'ks_v1_notes';

    // Token derivado de la contraseña (ofuscación básica)
    const validToken = 'ks:' + btoa(unescape(encodeURIComponent(SECRET_PASS)));

    // ─── AUTH ─────────────────────────────────────────
    function checkAuth() {
        if (localStorage.getItem(TOKEN_KEY) === validToken) showMain();
    }

    function authenticate() {
        const input = document.getElementById('auth-input').value;
        const inputToken = 'ks:' + btoa(unescape(encodeURIComponent(input)));

        if (inputToken === validToken) {
            localStorage.setItem(TOKEN_KEY, validToken);
            showMain();
        } else {
            const err = document.getElementById('auth-error');
            err.textContent = 'ACCESO DENEGADO';
            document.getElementById('auth-input').value = '';
            setTimeout(() => err.textContent = '', 1500);
        }
    }

    function showMain() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initMain();
    }

    function logout() {
        localStorage.removeItem(TOKEN_KEY);
        location.reload();
    }

    // ─── FONDO ANIMADO ────────────────────────────────
    const bgWords = [
        "LATENCIA","DOPAMINA","BUCLE","ERROR","TIEMPO",
        "LAG","NULL","VOID","NOISE","SYSTEM","DATA",
        "PIXEL","FRAME","CACHE","BIOS","INPUT","FOCUS",
        "DEEP","WORK","FLOW","BUILD","SHIP","ZERO"
    ];

    function spawnWord() {
        const canvas = document.getElementById('canvas-layer');
        const el = document.createElement('div');
        el.innerText = bgWords[Math.floor(Math.random() * bgWords.length)];
        el.className = 'floating-word';
        el.style.fontSize = (Math.floor(Math.random() * 5) + 1) + 'rem';
        el.style.left = Math.floor(Math.random() * 90) + '%';
        el.style.top  = Math.floor(Math.random() * 90) + '%';
        if (Math.random() > 0.5) el.style.transform = 'rotate(-90deg)';
        const r = Math.random();
        if      (r < 0.25) el.classList.add('glitch-color-1');
        else if (r < 0.5)  el.classList.add('glitch-color-2');
        else if (r < 0.75) el.classList.add('glitch-color-3');
        else               el.classList.add('glitch-color-4');
        canvas.appendChild(el);
        setTimeout(() => el.remove(), 900 + Math.random() * 900);
    }

    // ─── TODO LIST ────────────────────────────────────
    let todos = [];
    let saveTimer = null;

    function loadTodos() {
        try { todos = JSON.parse(localStorage.getItem(TODOS_KEY)) || []; }
        catch { todos = []; }
    }

    function saveTodos() {
        localStorage.setItem(TODOS_KEY, JSON.stringify(todos));
        flashSaved();
    }

    function renderTodos() {
        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach((item, i) => {
            const row = document.createElement('div');
            row.className = 'todo-item';
            row.innerHTML = `
                <input type="checkbox" class="todo-check" ${item.done ? 'checked' : ''}
                    onchange="toggleTodo(${i})">
                <textarea class="todo-text ${item.done ? 'done' : ''}"
                    rows="1"
                    spellcheck="false"
                    placeholder="..."
                    onInput="updateTodoText(${i}, this)"
                    onKeydown="todoKeydown(event, ${i})"
                >${item.text}</textarea>
                <button class="todo-delete" onclick="deleteTodo(${i})">✕</button>
            `;
            list.appendChild(row);
            // Auto-resize textarea
            const ta = row.querySelector('textarea');
            autoResize(ta);
        });
    }

    function autoResize(ta) {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
    }

    function addTodo(text = '') {
        todos.push({ text, done: false });
        saveTodos();
        renderTodos();
        // Focus last textarea
        const items = document.querySelectorAll('.todo-text');
        if (items.length) items[items.length - 1].focus();
    }

    function toggleTodo(i) {
        todos[i].done = !todos[i].done;
        saveTodos();
        renderTodos();
    }

    function deleteTodo(i) {
        todos.splice(i, 1);
        saveTodos();
        renderTodos();
    }

    function updateTodoText(i, ta) {
        todos[i].text = ta.value;
        autoResize(ta);
        debounceSave();
    }

    function todoKeydown(event, i) {
        if (event.key === 'Enter') {
            event.preventDefault();
            // Insert new todo after current
            todos.splice(i + 1, 0, { text: '', done: false });
            saveTodos();
            renderTodos();
            const items = document.querySelectorAll('.todo-text');
            if (items[i + 1]) items[i + 1].focus();
        } else if (event.key === 'Backspace') {
            const ta = event.target;
            if (ta.value === '' && todos.length > 1) {
                event.preventDefault();
                deleteTodo(i);
                const items = document.querySelectorAll('.todo-text');
                const prev = items[Math.max(0, i - 1)];
                if (prev) { prev.focus(); moveCursorToEnd(prev); }
            }
        }
    }

    function moveCursorToEnd(ta) {
        const len = ta.value.length;
        ta.setSelectionRange(len, len);
    }

    // ─── FREE NOTES ───────────────────────────────────
    function initFreeNotes() {
        const ta = document.getElementById('free-notes');
        ta.value = localStorage.getItem(NOTES_KEY) || '';
        ta.addEventListener('input', () => {
            localStorage.setItem(NOTES_KEY, ta.value);
            debounceSave();
        });
    }

    // ─── SAVE INDICATOR ───────────────────────────────
    function debounceSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            saveTodos();
            flashSaved();
        }, 600);
    }

    function flashSaved() {
        const el = document.getElementById('save-indicator');
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 1500);
    }

    // ─── INIT ─────────────────────────────────────────
    function initMain() {
        // Fondo animado
        setInterval(spawnWord, 160);
        setInterval(spawnWord, 160);

        // Todos
        loadTodos();
        if (todos.length === 0) todos.push({ text: '', done: false });
        renderTodos();

        // Notas libres
        initFreeNotes();
    }

    // Arranque: comprueba si ya hay token guardado
    checkAuth();
</script>
</body>
</html>
